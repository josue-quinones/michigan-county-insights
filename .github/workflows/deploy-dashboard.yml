name: Deploy Dashboard

on:
  push:
    branches:
      - master
    paths:
      - "mci-dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and deploy Static Web App
    runs-on: ubuntu-latest

    env:
      VITE_API_BASE_URL: https://mci-api.happyocean-6099a1f7.eastus.azurecontainerapps.io
      # Microsoft Clarity analytics. Set the CLARITY_PROJECT_ID repository secret to
      # your Clarity project id; when unset the tracking script is not injected.
      VITE_CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate demo snapshot
        # Pre-fetch the static reporting data so the demo paints instantly from the
        # CDN. Non-fatal: if the API is unreachable the deploy proceeds without it
        # and the app falls back to the live API.
        run: node scripts/generate-snapshot.mjs
        working-directory: mci-dashboard

      - name: Build and deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: mci-dashboard
          output_location: dist
          skip_api_build: true
